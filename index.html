<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>日用品ストック</title>
<style>
  :root {
    --bg: #f4f6f4;
    --card: #ffffff;
    --ink: #223;
    --sub: #778;
    --line: #dde3dd;
    --accent: #2e8b57;
    --accent-soft: #e6f4ec;
    --warn: #e8a000;
    --warn-soft: #fdf3dc;
    --danger: #d33a2f;
    --danger-soft: #fdeae8;
    --amazon: #ff9900;
    --rakuten: #bf0000;
    --yahoo: #ff0033;
    --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; font-size: 15px; }
  header { position: sticky; top: 0; z-index: 20; background: var(--accent); color: #fff;
    padding: 10px 16px 0; box-shadow: 0 1px 4px rgba(0,0,0,.15); }
  header h1 { margin: 0 0 8px; font-size: 18px; font-weight: 700; }
  header h1 small { font-weight: 400; opacity: .8; font-size: 12px; margin-left: 8px; }
  nav { display: flex; gap: 4px; max-width: 980px; }
  nav button { flex: 1; border: none; background: rgba(255,255,255,.15); color: #fff;
    padding: 9px 4px; font-size: 14px; border-radius: 8px 8px 0 0; cursor: pointer; }
  nav button.on { background: var(--bg); color: var(--ink); font-weight: 700; }
  main { max-width: 980px; margin: 0 auto; padding: 14px 14px 80px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 12px; }
  .card h2 { font-size: 15px; margin: 0 0 8px; color: var(--accent); }
  button { font-family: inherit; }
  .btn { border: 1px solid var(--line); background: #fff; color: var(--ink); padding: 8px 14px;
    border-radius: 8px; font-size: 14px; cursor: pointer; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  .btn.small { padding: 4px 10px; font-size: 12px; border-radius: 6px; }
  .btn:disabled { opacity: .4; cursor: default; }
  input[type=text], input[type=number], input[type=date], textarea, select {
    font-family: inherit; font-size: 14px; padding: 7px 9px; border: 1px solid var(--line);
    border-radius: 8px; background: #fff; color: var(--ink); }
  textarea { width: 100%; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .muted { color: var(--sub); font-size: 12px; }
  .chip { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 12px;
    background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .chip.warn { background: var(--warn-soft); color: #9a6b00; }
  .chip.danger { background: var(--danger-soft); color: var(--danger); }
  .sitebadge { display: inline-flex; align-items: center; justify-content: center; min-width: 20px;
    height: 20px; padding: 0 5px; border-radius: 5px; color: #fff; font-size: 11px; font-weight: 800; }
  .sitebadge.amazon { background: var(--amazon); }
  .sitebadge.rakuten { background: var(--rakuten); }
  .sitebadge.yahoo { background: var(--yahoo); }
  /* ストック行 */
  .cat-title { font-size: 13px; font-weight: 700; color: var(--sub); margin: 16px 2px 6px; }
  .item { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 10px 12px; margin-bottom: 8px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .item.needs { border-color: var(--warn); background: var(--warn-soft); }
  .item.urgent { border-color: var(--danger); background: var(--danger-soft); }
  .item .info { flex: 1 1 240px; min-width: 0; cursor: pointer; }
  .item .name { font-weight: 700; font-size: 15px; }
  .item .last { font-size: 12px; color: var(--sub); margin-top: 3px; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .lvl { display: flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .lvl button { border: none; background: #fff; padding: 7px 10px; font-size: 12px; cursor: pointer; color: var(--sub); }
  .lvl button.on2 { background: var(--accent); color: #fff; font-weight: 700; }
  .lvl button.on1 { background: var(--warn); color: #fff; font-weight: 700; }
  .lvl button.on0 { background: var(--danger); color: #fff; font-weight: 700; }
  .stock { display: flex; align-items: center; gap: 6px; }
  .stock button { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--line);
    background: #fff; font-size: 18px; cursor: pointer; }
  .stock .n { min-width: 52px; text-align: center; font-weight: 700; }
  .stock .n small { font-weight: 400; color: var(--sub); }
  /* 取込確認 */
  .order-head { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 4px 0; }
  .prod { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-top: 1px dashed var(--line);
    padding: 8px 0; }
  .prod .pname { flex: 1 1 260px; font-size: 14px; }
  .prod input.qty { width: 56px; }
  .prod input.price { width: 90px; }
  .prod select { max-width: 260px; }
  .prod.dup { opacity: .55; }
  .drop { border: 2px dashed var(--line); border-radius: var(--radius); padding: 22px; text-align: center;
    color: var(--sub); background: #fff; }
  .drop.over { border-color: var(--accent); background: var(--accent-soft); }
  /* シート・モーダル・トースト */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 50; display: none; }
  .overlay.show { display: block; }
  .sheet { position: fixed; left: 50%; transform: translateX(-50%); bottom: 0; width: min(560px, 100%);
    background: #fff; border-radius: 16px 16px 0 0; padding: 16px; z-index: 60; box-shadow: 0 -4px 24px rgba(0,0,0,.2); }
  .sheet h3 { margin: 0 0 10px; font-size: 15px; }
  .sheet .opt { display: flex; gap: 10px; align-items: center; width: 100%; text-align: left;
    border: 1px solid var(--line); background: #fff; border-radius: 10px; padding: 12px; margin-bottom: 8px;
    font-size: 14px; cursor: pointer; }
  .modal { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); width: min(560px, 94%);
    max-height: 88vh; overflow: auto; background: #fff; border-radius: 14px; padding: 18px; z-index: 60;
    box-shadow: 0 8px 32px rgba(0,0,0,.25); }
  .modal h3 { margin: 0 0 12px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 3px; }
  .field input[type=text], .field input[type=number], .field select { width: 100%; }
  #toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 24px; background: #333;
    color: #fff; padding: 10px 18px; border-radius: 999px; font-size: 14px; z-index: 99; opacity: 0;
    transition: opacity .25s; pointer-events: none; max-width: 90%; }
  #toast.show { opacity: 1; }
  .st-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .st-table td { border-bottom: 1px solid var(--line); padding: 5px 8px; }
  .ok { color: var(--accent); font-weight: 700; }
  .ng { color: var(--danger); font-weight: 700; }
  .hist { display: flex; gap: 10px; align-items: center; border-bottom: 1px solid var(--line); padding: 8px 2px; font-size: 14px; flex-wrap: wrap; }
  .hist .d { color: var(--sub); font-size: 12px; min-width: 78px; }
  .summary-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>🧺 日用品ストック<small id="verLabel"></small></h1>
  <nav>
    <button id="tab-stock" onclick="switchTab('stock')">ストック</button>
    <button id="tab-import" onclick="switchTab('import')">取り込み</button>
    <button id="tab-history" onclick="switchTab('history')">履歴</button>
    <button id="tab-settings" onclick="switchTab('settings')">設定</button>
  </nav>
</header>
<main id="main"></main>
<div class="overlay" id="overlay" onclick="closeLayers()"></div>
<div id="layer"></div>
<div id="toast"></div>
<input type="file" id="filePick" multiple accept=".eml,.mbox,.txt,message/rfc822" style="display:none">
<input type="file" id="bakPick" accept=".json" style="display:none">

function extractAmazon(msg, flatText, order) {
  const src = (msg.html || '') + '\n' + flatText;
  const idm = src.match(/(\d{3}-\d{7}-\d{7})/);
  if (idm) order.orderId = idm[1];
  const seenAsin = {};
  const asinRe = /\/(?:dp|gp\/product)\/([A-Z0-9]{10})(?![A-Z0-9])/;
  const re = /<a\b[^>]*href="([^"]+)"[^>]*>([\s\S]*?)<\/a>/gi;
  let m;
  while ((m = re.exec(msg.html || '')) !== null) {
    // トラッキング用リダイレクトURL（gp/r.html?U=https%3A%2F%2F...%2Fdp%2F...）にも対応するため
    // hrefをデコードしてからASINを探す
    let href = m[1].replace(/&amp;/gi, '&');
    try { href = decodeURIComponent(href); } catch (e) { /* 不正な%はそのまま */ }
    const am = href.match(asinRe);
    if (!am) continue;
    const asin = am[1];
    const name = stripTags(m[2]).replace(/\s+/g, ' ').trim();
    if (!name || name.length < 3 || /^https?:/.test(name)) continue;
    if (seenAsin[asin]) continue;
    seenAsin[asin] = true;
    const flat = stripTags(msg.html);
    const idx = flat.indexOf(name.slice(0, 12));
    const seg = idx >= 0 ? flat.slice(idx + name.length, idx + name.length + 120) : '';
    order.products.push({ name: name, asin: asin,
      url: 'https://www.amazon.co.jp/dp/' + asin,
      price: pickPrice(seg), qty: pickQty(seg) });
  }
  if (!order.products.length) {
    // テキストのみのメール: 行パターンで推定（商品名行の後に 数量/￥ が続く）
    const lines = flatText.split(/\r?\n/).map(function(l) { return l.trim(); });
    for (let i = 0; i < lines.length; i++) {
      if (/^(?:数量|個数)[：:]?\s*\d+/.test(lines[i]) && i > 0 && lines[i - 1].length > 4 &&
          !/注文|合計|お届け|配送|￥/.test(lines[i - 1])) {
        const seg = lines.slice(i, i + 3).join(' ');
        order.products.push({ name: lines[i - 1], asin: '', url: '',
          price: pickPrice(seg), qty: pickQty(seg) });
      }
    }
    // 本文中の商品URLからASINを補完（商品1件のときだけ確実にひも付く）
    if (order.products.length === 1 && !order.products[0].asin) {
      const um = ((msg.text || '') + ' ' + flatText).match(/https?:\/\/www\.amazon\.co\.jp\/[^\s"'<>]*?(?:dp|gp\/product)\/([A-Z0-9]{10})(?![A-Z0-9])/);
      if (um) {
        order.products[0].asin = um[1];
        order.products[0].url = 'https://www.amazon.co.jp/dp/' + um[1];
      }
    }
  }
}
function labeledBlocks(text, order, urlRe, urlHost) {
  const segs = String(text).split(/商品名[：:]\s*/).slice(1);
  segs.forEach(function(seg) {
    const name = seg.split(/\r?\n/)[0].trim();
    if (!name) return;
    const win = seg.slice(0, 400);
    const um = win.match(urlRe);
    order.products.push({ name: name, asin: '',
      url: um ? um[0].replace(/[)＞>」\]]+$/, '') : '',
      price: pickPrice(win), qty: pickQty(win) });
  });
  if (!order.products.length) {
    // ラベル無し形式: 商品URLの直前の非空行を商品名とみなす
    const lines = String(text).split(/\r?\n/);
    for (let i = 0; i < lines.length; i++) {
      const um = lines[i].match(urlRe);
      if (!um) continue;
      let name = '';
      for (let j = i - 1; j >= 0 && j >= i - 4; j--) {
        const t = lines[j].trim();
        if (t && !urlRe.test(t) && !/^[\d,¥￥円\s]+$/.test(t)) { name = t; break; }
      }
      if (name) {
        const win = lines.slice(Math.max(0, i - 3), i + 3).join('\n');
        order.products.push({ name: name.replace(/^商品名[：:]\s*/, ''), asin: '',
          url: um[0], price: pickPrice(win), qty: pickQty(win) });
      }
    }
  }
}
function extractRakuten(msg, flatText, order) {
  const idm = flatText.match(/(?:受注|注文)番号[\]】〕）)]*[：:]?\s*([0-9][0-9\-]{8,30})/);
  if (idm) order.orderId = idm[1];

}
function extractYahoo(msg, flatText, order) {

  if (idm) order.orderId = idm[1];

}
function extractGeneric(msg, flatText, order) {
  labeledBlocks(flatText, order, /https?:\/\/[^\s"'<>）)」]+/);
}
function extractOrder(msg) {
  const site = detectSite(msg);
  const flatText = ((msg.text || '') + '\n' + stripTags(msg.html || ''));
  const order = { site: site, orderId: '', subject: msg.subject || '',
    date: (msg.date && !isNaN(msg.date)) ? msg.date : dateFromBody(flatText), products: [] };
  if (site === 'amazon') extractAmazon(msg, flatText, order);
  else if (site === 'rakuten') extractRakuten(msg, flatText, order);
  else if (site === 'yahoo') extractYahoo(msg, flatText, order);
  else extractGeneric(msg, flatText, order);
  order.products = order.products.filter(function(p) { return p.name && p.name.length >= 2; }).slice(0, 30);
  if (!order.products.length) order.snippet = flatText.replace(/\s+/g, ' ').trim().slice(0, 500);
  return order;
}
function parseInput(bin) {
  const msgs = splitMbox(bin) || [bin];
  const orders = [];
  msgs.forEach(function(m) {
    try {
      const msg = looksLikeRfc822(m) ? parseMessage(m)
        : { headers: {}, subject: '', from: '', date: null, text: m, html: '' };
      const o = extractOrder(msg);
      if (o.products.length || o.site !== 'other') orders.push(o);
    } catch (e) { /* 1通の失敗で全体を止めない */ }
  });
  return orders;
}

function marketQuery(it) {

function pickRakutenCheapest(q, data) {
  const items = ((data && data.Items) || []).map(function(x) { return x.Item || x; });
  let best = null;
  items.forEach(function(x) {
    if (!x) return;
    const price = parseInt(x.itemPrice, 10);
    if (!isFinite(price) || price <= 0) return;
    if (sim(q, x.itemName || '') < 0.35) return;   // 無関係な商品（付属品・別商品）を除外
    if (!best || price < best.price) best = { price: price, name: x.itemName || '', url: x.itemUrl || '', shop: x.shopName || '' };
  });
  return best;
}
async function fetchRakutenMarket(it) {
  const appId = (state.settings.rakutenAppId || '').trim();

  const q = marketQuery(it);
  const u = new URL('https://app.rakuten.co.jp/services/api/IchibaItem/Search/20220601');
  u.searchParams.set('format', 'json');
  u.searchParams.set('applicationId', appId);
  u.searchParams.set('keyword', q);
  u.searchParams.set('hits', '20');

    if (hit) return hit.id;

// 購入間隔の中央値から「そろそろ切れる頃」を予測（履歴2件以上で有効）
function predictDays(it) {
  const ts = state.orders.filter(function(o) { return o.itemId === it.id; })
    .map(function(o) { return new Date(o.date).getTime(); })
    .filter(function(t) { return isFinite(t); }).sort(function(a, b) { return a - b; });
  if (ts.length < 2) return null;
  const gaps = [];
  for (let i = 1; i < ts.length; i++) { const g = ts[i] - ts[i - 1]; if (g >= 2 * 86400000) gaps.push(g); }
  if (!gaps.length) return null;
  gaps.sort(function(a, b) { return a - b; });
  const med = gaps[Math.floor(gaps.length / 2)];
  return { daysLeft: Math.round((ts[ts.length - 1] + med - Date.now()) / 86400000),
    cycleDays: Math.round(med / 86400000) };
}

}

function assignOptions(p, site) {
  const m = bestMatch(p.name, site);
  let h = '';
  const newSel = !(m.item && m.score >= 0.45);
  h += '<option value="new"' + (newSel ? ' selected' : '') + '>＋新規品目「' + esc(shortName(p.name)) + '」</option>';
  const scored = state.items.map(function(it) {
    let sc = sim(p.name, it.name);
    const si = it.sites && it.sites[site];
    if (si && si.name) sc = Math.max(sc, sim(p.name, si.name));
    return { it: it, sc: sc };
  }).sort(function(a, b) { return b.sc - a.sc; });
  scored.forEach(function(x) {
    const star = x.sc >= 0.45 ? '★ ' : (x.sc >= 0.25 ? '☆ ' : '');
    h += '<option value="' + x.it.id + '"' + (!newSel && m.item === x.it ? ' selected' : '') + '>' + star + esc(x.it.name) + '</option>';
  });
  return h;
}
function shortName(name) {
  // 商品名から容量・詰替等の飾りを落として品目名らしくする（そのままでも編集可能）
  let n = String(name).replace(/[【\[(（][^】\])）]*[】\])）]/g, ' ')
    .replace(/(詰め?替え?用?|つめかえ用?|本体|セット|まとめ買い|お徳用|大容量)/g, ' ')
    .replace(/[0-9,.]+\s*(ml|mL|L|g|kg|個|枚|本|組|ロール|箱|袋|回分|倍)/gi, ' ')
    .replace(/[×x✕]\s*[0-9]*/g, ' ')
    .replace(/\s+/g, ' ').trim();
  return (n.length >= 3 ? n : String(name)).slice(0, 30);
}
function readFiles(files) {
  const list = Array.prototype.slice.call(files || []);
  if (!list.length) return;
  const totalMB = list.reduce(function(s, f) { return s + (f.size || 0); }, 0) / 1048576;
  toast(totalMB > 30 ? 'ファイルを読み込み中…（' + Math.round(totalMB) + 'MB・少しお待ちください）' : 'ファイルを読み込み中…');
  let done = 0; const bins = [];
  function finish() { if (++done === list.length) { if (bins.length) ingest(bins); } }
  list.forEach(function(f) {
    const r = new FileReader();
    r.onload = function() {
      try { bins.push(new TextDecoder('latin1').decode(r.result)); }
      catch (e) { toast('「' + f.name + '」が大きすぎて読み込めませんでした。Gmailでラベルを付けて絞り込んでから書き出してください'); }
      finish();
    };
    r.onerror = function() {
      toast('「' + f.name + '」を読み込めませんでした（大きすぎる可能性）。ラベルで絞ってから書き出してください');
      finish();
    };
    r.readAsArrayBuffer(f);
  });
}
function parsePaste() {
  const t = document.getElementById('pasteBox').value;
  if (!t.trim()) { toast('本文を貼り付けてください'); return; }
  ingest([t]);
}
function parseSamples() {
  if (typeof SAMPLES === 'undefined' || !SAMPLES) return;
  ingest([SAMPLES.amazon, SAMPLES.rakuten, SAMPLES.yahoo]);
}
function ingest(bins) {
  let orders = [];
  bins.forEach(function(b) { orders = orders.concat(parseInput(b)); });
  if (!orders.length) { toast('注文メールを認識できませんでした'); return; }
  orders.forEach(function(o) {
    o.products.forEach(function(p) {
      p.dup = !!state.seen[seenKey(o.site, o.orderId, p.name)];
      p.auto = p.dup ? '' : autoTarget(p, o.site);
    });
  });
  // 同一注文が既にpendingにあれば置き換えない（単純に足す前に重複除去）
  const key = function(o) { return o.site + '|' + o.orderId + '|' + (o.products[0] ? o.products[0].name : ''); };
  const have = {}; pending.forEach(function(o) { have[key(o)] = 1; });
  orders.forEach(function(o) { if (!have[key(o)]) pending.push(o); });
  pending.sort(function(a, b) { return String(b.date) > String(a.date) ? 1 : -1; });
  render();
  const n = orders.reduce(function(s, o) { return s + o.products.length; }, 0);
  toast(orders.length + '通・商品' + n + '件を解析しました。内容を確認してください');
  const pa = document.getElementById('pendingArea');
  if (pa) pa.scrollIntoView({ behavior: 'smooth' });
}
function applyImport() {
  let added = 0, newItems = 0, autoN = 0, skipped = 0;
  pending.forEach(function(o, oi) {
    o.products.forEach(function(p, pi) {
      const id = 'p-' + oi + '-' + pi;
      const cb = document.getElementById(id + '-c');
      if (!cb || !cb.checked) { if (!p.dup) skipped++; return; }
      // おまかせ行は数量/価格/登録先の入力欄が無い→解析値とp.autoを使う
      const qEl = document.getElementById(id + '-q');
      const qty = qEl ? Math.max(1, parseInt(qEl.value, 10) || 1) : Math.max(1, p.qty || 1);
      const pEl = document.getElementById(id + '-p');
      const price = pEl ? (pEl.value === '' ? null : Math.max(0, parseInt(pEl.value, 10) || 0))
        : (p.price != null ? p.price : null);
      const selEl = document.getElementById(id + '-sel');
      const sel = selEl ? selEl.value : (p.auto || 'new');
      let it;
      if (sel === 'new') {
        it = { id: uid('i'), name: shortName(p.name), category: guessCategory(p.name),
          level: 2, stock: 0, reorderPoint: 1, unit: '個', memo: '', sites: {}, market: {}, ordered: null };
        state.items.push(it); newItems++;
      } else {
        it = findItem(sel);
        if (!it) { skipped++; return; }
        if (!selEl) autoN++;
      }
      const dateIso = (o.date && !isNaN(o.date)) ? new Date(o.date).toISOString() : new Date().toISOString();
      state.orders.push({ id: uid('o'), itemId: it.id, site: o.site, orderId: o.orderId,
        date: dateIso, productName: p.name, qty: qty, price: price, url: p.url || '', asin: p.asin || '' });
      const si = it.sites[o.site] || {};
      if (!si.lastDate || dateIso > si.lastDate) {
        si.name = p.name; si.lastPrice = price; si.lastDate = dateIso;
        if (p.url) si.url = p.url;
        if (p.asin) si.asin = p.asin;
      }
      it.sites[o.site] = si;
      state.seen[seenKey(o.site, o.orderId, p.name)] = 1;
      // 次回から確認なしでひも付くよう学習
      state.nameMap[nameKey(p.name)] = it.id;
      // 直近2週間の注文なら「注文済み（届き待ち）」として扱う
      if (!it.ordered && (Date.now() - new Date(dateIso).getTime()) < 14 * 86400000) {
        it.ordered = { at: dateIso, site: o.site, qty: qty };
      }
      added++;
    });
  });
  pending = [];
  save(); render();
  toast('取り込み完了: 注文' + added + '件（新規品目' + newItems + '件' + (autoN ? '・おまかせ' + autoN + '件' : '') + '）' +
    (skipped ? '・スキップ' + skipped + '件' : ''));
}

// ---------- Gmail API ----------
let gisLoaded = false;
function loadGis() {
  return new Promise(function(res, rej) {
    if (gisLoaded && window.google && google.accounts) { res(); return; }
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = function() { gisLoaded = true; res(); };
    s.onerror = function() { rej(new Error('Googleの認証スクリプトを読み込めませんでした（オフライン？）')); };
    document.head.appendChild(s);
  });
}
function gmailStatus(msg) {
  const el = document.getElementById('gmailStatus');
  if (el) el.textContent = msg;
}
function buildGmailQuery(lastSyncAt) {
  let q = state.settings.gmailQuery || DEFAULT_GMAIL_QUERY;
  let after;
  if (lastSyncAt) {
    after = new Date(new Date(lastSyncAt).getTime() - 3 * 86400000); // 3日重ねて取りこぼし防止
  } else {
    after = new Date(); after.setMonth(after.getMonth() - (state.settings.syncMonths || 12));
  }
  q += ' after:' + after.getFullYear() + '/' + (after.getMonth() + 1) + '/' + after.getDate();
  return q;
}
function findAccount(email) {
  email = String(email || '').toLowerCase();
  return (state.settings.accounts || []).find(function(a) { return a.email === email; });
}
async function gfetch(url, token) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) {
    let detail = '';
    try { detail = (await r.json()).error.message; } catch (e) {}
    throw new Error('Gmail API エラー ' + r.status + (detail ? ': ' + detail : ''));
  }
  return r.json();
}
function b64urlToBin(s) {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  return atob(s);
}
async function gmailSync() {
  const cid = (state.settings.gmailClientId || '').trim();
  if (!cid) { toast('先に設定タブでClient IDを登録してください'); switchTab('settings'); return; }
  try {
    gmailStatus('Googleにログイン中…（アカウントを選んでください）');
    await loadGis();
    // prompt:'select_account' で毎回アカウント選択画面を出す＝複数アカウントを切り替えて取り込める
    const token = await new Promise(function(res, rej) {
      const tc = google.accounts.oauth2.initTokenClient({
        client_id: cid,
        scope: 'https://www.googleapis.com/auth/gmail.readonly',
        prompt: 'select_account',
        callback: function(resp) {
          if (resp && resp.access_token) res(resp.access_token);
          else rej(new Error((resp && resp.error) || 'ログインがキャンセルされました'));
        },
        error_callback: function(e) { rej(new Error(e && e.message || 'ログインがキャンセルされました')); }
      });
      tc.requestAccessToken();
    });
    // ログインしたアカウントを特定（アカウントごとに取り込み範囲を別管理するため）
    gmailStatus('アカウントを確認中…');
    const profile = await gfetch('https://gmail.googleapis.com/gmail/v1/users/me/profile', token);
    const email = (profile.emailAddress || '').toLowerCase();
    let acct = findAccount(email);
    if (!acct) { acct = { email: email, lastSyncAt: '' }; state.settings.accounts.push(acct); }
    const q = buildGmailQuery(acct.lastSyncAt);
    gmailStatus(email + ' の注文メールを検索中…');
    let ids = [], pageToken = '';
    do {
      const u = new URL('https://gmail.googleapis.com/gmail/v1/users/me/messages');
      u.searchParams.set('q', q);
      u.searchParams.set('maxResults', '100');
      if (pageToken) u.searchParams.set('pageToken', pageToken);
      const r = await gfetch(u.toString(), token);
      (r.messages || []).forEach(function(m) { ids.push(m.id); });
      pageToken = r.nextPageToken || '';
    } while (pageToken && ids.length < 500);
    if (!ids.length) {
      acct.lastSyncAt = new Date().toISOString(); save();
      if (currentTab === 'import') renderImport();
      gmailStatus(email + '：対象期間に新しい注文メールはありませんでした');
      return;
    }
    const bins = [];
    for (let i = 0; i < ids.length; i += 10) {
      gmailStatus(email + ' のメールを取得中… ' + Math.min(i + 10, ids.length) + '/' + ids.length);
      const chunk = await Promise.all(ids.slice(i, i + 10).map(function(id) {
        return gfetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/' + id + '?format=raw', token)
          .then(function(m) { return m.raw ? b64urlToBin(m.raw) : ''; })
          .catch(function() { return ''; });
      }));
      chunk.forEach(function(b) { if (b) bins.push(b); });
    }
    gmailStatus(email + ' の解析中…');
    acct.lastSyncAt = new Date().toISOString();
    state.settings.lastSyncAt = acct.lastSyncAt; save();
    ingest(bins);
    gmailStatus('完了: ' + email + ' から ' + bins.length + '通を解析しました。別のアカウントも取り込むには、もう一度ボタンを押して切り替えてください');
  } catch (e) {
    gmailStatus('⚠ ' + e.message);
    toast('Gmail取り込みに失敗: ' + e.message);
  }
}

      if (!confirm('現在のデータ（品目' + state.items.length + '件）を、バックアップ（品目' +

    catch (e) { results.push({ name: name, ok: false, detail: e.message }); }
  }
  t('QPデコード（UTF-8）', function() { return decodeBytes(qpToBytes('=E3=81=82'), 'utf-8') === 'あ'; });
  t('base64デコード（UTF-8）', function() { return decodeBytes(b64ToBytes('44GT44KT44Gr44Gh44Gv'), 'utf-8') === 'こんにちは'; });
  if (typeof SAMPLES !== 'undefined' && SAMPLES) {

    t('Amazon: 価格', function() { return ao.products[0].price === 1234 && ao.products[1].price === 498; });

    t('Amazon: 日付', function() { return ao.date && ao.date.getMonth() === 5 && ao.date.getDate() === 23; });
    const rm = parseMessage(SAMPLES.rakuten);

    t('楽天: ISO-2022-JP本文', function() { return rm.text.indexOf('トイレットペーパー') >= 0; });

  t('検索URL生成', function() { return searchUrl('rakuten', 'アタック').indexOf('search.rakuten.co.jp') >= 0; });
  t('重複キー: 同一注文は同一キー', function() {
    return seenKey('amazon', '249-1', 'アタック ZERO') === seenKey('amazon', '249-1', 'アタック　ZERO') &&
      seenKey('amazon', '249-1', 'アタック') !== seenKey('amazon', '249-2', 'アタック');
  });
  t('空入力で落ちない', function() { return parseInput('').length === 0; });
  t('ゴミ入力で落ちない', function() { return Array.isArray(parseInput('%%% ###ただの文字列###')); });
  t('カテゴリ推定', function() {
    return guessCategory('エリエール トイレットペーパー') === '紙類' && guessCategory('謎の商品XYZ') === 'その他';
  });
  t('品目名の短縮', function() {
    const s = shortName('【大容量】アタック ZERO 洗濯洗剤 詰め替え 1800g×2袋');
    return s.indexOf('アタック') >= 0 && s.indexOf('1800') < 0 && s.indexOf('大容量') < 0;
  });
  t('状態マイグレーション: 空/壊れたデータ', function() {
    const a = migrate(null), b = migrate({ items: [{ id: 'x', name: 'テスト' }] });
    return a.items.length === 0 && b.items[0].level === 2 && b.items[0].sites && b.settings.gmailQuery.length > 0;
  });
  t('マイグレーション: v1データ→v2（market/楽天ID追加・既存データ保持）', function() {
    const s = migrate({ version: 1, items: [{ id: 'x', name: 'テスト', sites: { amazon: { asin: 'B000000000' } } }],
      orders: [{ id: 'o1', itemId: 'x' }], settings: { gmailClientId: 'abc' } });
    return s.version === APP_VERSION && s.items[0].market && s.items[0].sites.amazon.asin === 'B000000000' &&
      s.orders.length === 1 && s.settings.gmailClientId === 'abc' && typeof s.settings.rakutenAppId === 'string';
  });
  t('楽天相場: 類似候補の最安を選ぶ（文字列価格も可）', function() {
    const data = { Items: [
      { Item: { itemName: 'アタック ZERO 洗濯洗剤 詰め替え 1800g', itemPrice: 1180, itemUrl: 'https://item.rakuten.co.jp/a/1/', shopName: 'A店' } },
      { Item: { itemName: '洗濯機用 防振ゴム 4個セット', itemPrice: 100, itemUrl: 'https://item.rakuten.co.jp/b/2/', shopName: 'B店' } },
      { Item: { itemName: 'アタック ZERO 洗濯洗剤 詰め替え 1800g 2袋セット', itemPrice: '980', itemUrl: 'https://item.rakuten.co.jp/c/3/', shopName: 'C店' } }
    ] };
    const best = pickRakutenCheapest('アタック ZERO 洗濯洗剤 詰め替え 1800g', data);
    return best && best.price === 980 && best.url.indexOf('/c/3/') >= 0 && best.shop === 'C店';
  });
  t('楽天相場: 無関係な商品しか無ければnull', function() {
    const data = { Items: [{ Item: { itemName: '全然関係ない雑貨', itemPrice: 10, itemUrl: 'u', shopName: 's' } }] };
    return pickRakutenCheapest('アタック ZERO 洗濯洗剤', data) === null;
  });
  t('楽天相場: 空レスポンスで落ちない', function() {
    return pickRakutenCheapest('テスト', {}) === null && pickRakutenCheapest('テスト', { Items: [] }) === null;
  });
  t('最安リスト: 現在相場と前回価格を統合して昇順', function() {
    const it = { market: { rakuten: { price: 980, url: 'u1', at: '2026-07-07' } },
      sites: { amazon: { lastPrice: 1234, lastDate: '2026-06-23' }, yahoo: { lastPrice: 248, lastDate: '2026-06-20' } } };
    const l = bestPriceList(it);
    return l.length === 3 && l[0].site === 'yahoo' && l[0].price === 248 &&
      l[1].price === 980 && l[1].kind === 'current' && l[2].price === 1234;
  });
  t('最安表示: 前回価格1件のみなら行を出さない', function() {
    const one = { market: {}, sites: { amazon: { lastPrice: 500, lastDate: '2026-06-01' } } };
    const two = { market: { rakuten: { price: 400, url: 'u', at: '2026-07-07' } }, sites: {} };
    return priceLine(one) === '' && priceLine(two).indexOf('¥400') >= 0;
  });
  t('相場クエリ: 購入時の商品名を優先', function() {
    const a = marketQuery({ name: '洗剤', sites: { rakuten: { name: 'キュキュット 食器用洗剤 詰め替え 770ml' } } });
    const b = marketQuery({ name: '洗剤', sites: {} });
    return a.indexOf('キュキュット') >= 0 && b === '洗剤';
  });
  t('ヘッダ判定: 長い認証ヘッダの実メールも認識', function() {
    let junk = '';
    for (let i = 0; i < 60; i++) junk += 'X-Header-' + i + ': ' + new Array(80).join('x') + '\r\n';
    const raw = 'Delivered-To: a@b.c\r\n' + junk + 'Subject: test\r\nFrom: t@amazon.co.jp\r\n\r\nbody';
    return looksLikeRfc822(raw) && looksLikeRfc822(junk + 'Subject: x\r\n\r\nbody') &&
      !looksLikeRfc822('楽天市場でのご注文\nありがとうございます');
  });
  t('Amazon: リダイレクトリンクからASIN抽出', function() {
    const html = '<html><body><p>注文番号: 249-1111111-2222222</p>' +
      '<a href="https://www.amazon.co.jp/gp/r.html?C=abc&amp;U=https%3A%2F%2Fwww.amazon.co.jp%2Fdp%2FB00EXMPL03%3Fref%3Dx&amp;H=1">テスト商品 シャンプー 詰め替え</a> 数量: 2 ￥980</body></html>';
    const o = extractOrder({ subject: 'ご注文', from: 'auto-confirm@amazon.co.jp', date: new Date(2026, 6, 1), text: '', html: html });
    return o.products.length === 1 && o.products[0].asin === 'B00EXMPL03' && o.products[0].qty === 2 && o.products[0].price === 980;
  });
  t('Amazon: テキスト形式メール＋本文URLからASIN補完', function() {
    const txt = 'Amazon.co.jp ご注文の確認\n注文番号: 249-3333333-4444444\n\nボディソープ 詰替 800ml\n数量: 1\n￥698\n\nhttps://www.amazon.co.jp/dp/B00EXMPL04?ref=order\n';
    const o = extractOrder({ subject: '', from: 'auto-confirm@amazon.co.jp', date: null, text: txt, html: '' });
    return o.products.length === 1 && o.products[0].name.indexOf('ボディソープ') >= 0 && o.products[0].asin === 'B00EXMPL04';
  });
  t('検出0件のメールは本文冒頭を保持（調整用表示）', function() {
    const o = extractOrder({ subject: 'x', from: 'auto-confirm@amazon.co.jp', date: null, text: '特殊な形式のメール本文です。商品リストなし。', html: '' });
    return o.products.length === 0 && o.snippet && o.snippet.indexOf('特殊な形式') >= 0;
  });
  t('複数アカウント: 検索クエリはアカウント別のlastSyncAtで作る', function() {
    const full = buildGmailQuery('');           // 初回=過去syncMonthsヶ月
    const inc = buildGmailQuery('2026-06-01T00:00:00.000Z');  // 増分=lastSyncAtの3日前から
    const d = new Date(new Date('2026-06-01T00:00:00.000Z').getTime() - 3 * 86400000);
    const expect = 'after:' + d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
    return /after:\d{4}\/\d{1,2}\/\d{1,2}/.test(full) && inc.indexOf(expect) >= 0 && full !== inc;
  });
  t('複数アカウント: マイグレーションでaccounts配列を用意', function() {
    const a = migrate({ version: 2, settings: { gmailClientId: 'x' } });  // 旧データにaccountsなし
    const b = migrate({ version: 3, settings: { accounts: [{ email: 'a@b.c', lastSyncAt: '2026-07-01' }] } });
    return Array.isArray(a.settings.accounts) && a.settings.accounts.length === 0 &&
      b.settings.accounts.length === 1 && b.settings.accounts[0].email === 'a@b.c';
  });
  t('複数アカウント: findAccountは大文字小文字を無視', function() {
    state.settings.accounts = [{ email: 'hata@example.com', lastSyncAt: '2026-07-01' }];
    const hit = findAccount('HATA@Example.com'), miss = findAccount('other@example.com');
    state.settings.accounts = [];
    return hit && hit.lastSyncAt === '2026-07-01' && !miss;
  });
  t('おまかせ: ASIN/URL/学習名で既存品目に自動ひも付け', function() {
    const bakItems = state.items, bakMap = state.nameMap;
    state.items = [
      { id: 'i1', name: 'A', sites: { amazon: { asin: 'B00EXMPL01' } } },
      { id: 'i2', name: 'B', sites: { rakuten: { url: 'https://item.rakuten.co.jp/shop/xyz/' } } },
      { id: 'i3', name: 'C', sites: {} }];
    state.nameMap = {}; state.nameMap[nameKey('キュキュット 食器用洗剤 詰め替え')] = 'i3';
    const a = autoTarget({ asin: 'B00EXMPL01', url: '', name: '何か' }, 'amazon');
    const b = autoTarget({ asin: '', url: 'https://item.rakuten.co.jp/shop/xyz?ver=2', name: '別名' }, 'rakuten');
    const c = autoTarget({ asin: '', url: '', name: 'キュキュット　食器用洗剤 詰め替え' }, 'yahoo');
    const d = autoTarget({ asin: '', url: '', name: '完全に新しい商品' }, 'amazon');
    state.items = bakItems; state.nameMap = bakMap;
    return a === 'i1' && b === 'i2' && c === 'i3' && d === '';
  });
  t('注文済み: 要買い足し判定から除外される', function() {
    const it = { stock: 0, reorderPoint: 1, level: 0, ordered: null };
    const before = needsBuy(it) && isUrgent(it);
    it.ordered = { at: '2026-07-09', site: 'amazon', qty: 2 };
    return before === true && !needsBuy(it) && !isUrgent(it);
  });
  t('切れ予測: 30日周期の履歴から残り日数を計算', function() {
    const bak = state.orders;
    const day = 86400000, now = Date.now();
    state.orders = [
      { itemId: 'px', date: new Date(now - 85 * day).toISOString() },
      { itemId: 'px', date: new Date(now - 55 * day).toISOString() },
      { itemId: 'px', date: new Date(now - 25 * day).toISOString() }];
    const pr = predictDays({ id: 'px' });
    const single = predictDays({ id: 'none' });
    state.orders = bak;
    return pr && pr.cycleDays === 30 && pr.daysLeft === 5 && single === null;
  });
  t('マイグレーション: v3→v4（nameMap/ordered追加・既存データ保持）', function() {
    const s = migrate({ version: 3, items: [{ id: 'x', name: 'テスト', stock: 2 }], orders: [{ id: 'o1' }], seen: { k: 1 } });
    return s.version === APP_VERSION && s.nameMap && typeof s.nameMap === 'object' &&
      s.items[0].ordered === null && s.items[0].stock === 2 && s.orders.length === 1 && s.seen.k === 1;
  });
  t('取込分類: 新規/おまかせ/取込済み/商品なしを数える', function() {
    const bak = pending;
    pending = [
      { site: 'amazon', products: [{ name: 'n1' }, { name: 'n2', auto: 'i1' }, { name: 'n3', dup: true }] },
      { site: 'rakuten', products: [] }];
    const c = classifyPending();
    pending = bak;
    return c.fresh === 1 && c.auto === 1 && c.dup === 1 && c.empty === 1;
  });
  t('URL正規化: クエリと末尾スラッシュを無視して一致', function() {
    return normUrl('https://item.rakuten.co.jp/S/X/?ver=2#a') === normUrl('https://item.rakuten.co.jp/s/x') &&
      normUrl('') === '';
  });
  if (typeof SAMPLES !== 'undefined' && SAMPLES) {
    t('mbox: Takeout風のFrom行（数値@ホスト＋日付）で分割', function() {
      const tk = 'From 1752345678901234567@xxx Mon Jul 13 09:00:00 +0000 2026\r\n' + SAMPLES.amazon +
        '\r\nFrom 1752999999999999999@xxx Sun Jun 15 21:30:00 +0000 2026\r\n' + SAMPLES.rakuten;
      const parts = splitMbox(tk);
      if (!parts || parts.length !== 2) return 'parts=' + (parts ? parts.length : 'null');
      const os = parseInput(tk);
      return os.length === 2 && os[0].site === 'amazon' && os[1].site === 'rakuten' &&
        os[0].products.length === 2 && os[1].products.length === 2;
    });
    t('mbox: 大量メール（150通）でも分割・解析できる', function() {
      let big = '';
      for (let i = 0; i < 75; i++) {
        big += 'From msg' + i + 'a@xxx Mon Jul 13 09:00:00 +0000 2026\r\n' + SAMPLES.amazon + '\r\n';
        big += 'From msg' + i + 'b@xxx Sun Jun 15 21:30:00 +0000 2026\r\n' + SAMPLES.rakuten + '\r\n';
      }
      const parts = splitMbox(big);
      const os = parseInput(big);
      return parts && parts.length === 150 && os.length === 150;
    });
  }
  const okN = results.filter(function(r) { return r.ok; }).length;
  let h = '<div class="card"><h2>セルフテスト結果: ' + okN + ' / ' + results.length + ' 合格</h2><table class="st-table">';
  results.forEach(function(r) {
    h += '<tr><td class="' + (r.ok ? 'ok' : 'ng') + '">' + (r.ok ? '✔' : '✘') + '</td><td>' + esc(r.name) + '</td><td class="muted">' + esc(r.detail) + '</td></tr>';
  });
  h += '</table><p><a href="./">← アプリに戻る</a></p></div>';
  document.getElementById('main').innerHTML = h;
  document.title = 'selftest ' + okN + '/' + results.length;
}

document.getElementById('bakPick').addEventListener('change', function(e) { if (e.target.files[0]) importBackup(e.target.files[0]); e.target.value = ''; });
load();
document.getElementById('verLabel').textContent = 'v' + APP_VERSION;
if (navigator.storage && navigator.storage.persist) navigator.storage.persist().catch(function() {});
if (/[?&]selftest=1/.test(location.search)) {
  document.querySelector('nav').style.display = 'none';
  runSelftest();
} else {
  switchTab('stock');
}
